<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GrabVid — YouTube Video Downloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080809;
      --surface:  #101013;
      --card:     #16161a;
      --border:   #ffffff0f;
      --accent:   #00e5a0;
      --accent2:  #00b87a;
      --text:     #f0f0f0;
      --muted:    #888;
      --danger:   #ff4d6d;
      --radius:   14px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Noise overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    /* ── Glow blob ── */
    .glow {
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, #00e5a015 0%, transparent 70%);
      border-radius: 50%;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ── */
    .container {
      position: relative;
      z-index: 1;
      max-width: 780px;
      margin: 0 auto;
      padding: 0 20px 80px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 0 0;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.3rem;
      letter-spacing: -0.5px;
    }

    .logo span { color: var(--accent); }

    .badge {
      font-size: 0.7rem;
      font-weight: 500;
      background: var(--accent)18;
      color: var(--accent);
      border: 1px solid var(--accent)30;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ── Hero ── */
    .hero {
      text-align: center;
      padding: 64px 0 48px;
    }

    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2.2rem, 5vw, 3.2rem);
      line-height: 1.1;
      letter-spacing: -1.5px;
      margin-bottom: 16px;
    }

    .hero h1 em {
      font-style: normal;
      color: var(--accent);
    }

    .hero p {
      color: var(--muted);
      font-size: 1rem;
      font-weight: 300;
    }

    /* ── Input bar ── */
    .input-wrap {
      display: flex;
      gap: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }

    .input-wrap:focus-within {
      border-color: var(--accent)50;
      box-shadow: 0 0 0 3px var(--accent)0d;
    }

    .input-wrap input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 18px 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
    }

    .input-wrap input::placeholder { color: var(--muted); }

    .btn-fetch {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 0 28px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    .btn-fetch:hover { background: var(--accent2); }
    .btn-fetch:active { transform: scale(0.98); }
    .btn-fetch:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Error ── */
    .error-msg {
      background: var(--danger)12;
      border: 1px solid var(--danger)30;
      color: var(--danger);
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.875rem;
      display: none;
      margin-bottom: 16px;
    }

    /* ── Video card ── */
    .video-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: none;
      margin-bottom: 24px;
      animation: fadeUp 0.3s ease;
    }

    .video-card.visible { display: block; }

    .video-inner {
      display: flex;
      gap: 16px;
      padding: 16px;
      align-items: flex-start;
    }

    .thumb-wrap {
      position: relative;
      flex-shrink: 0;
      width: 140px;
      border-radius: 8px;
      overflow: hidden;
      aspect-ratio: 16/9;
      background: #1a1a1e;
    }

    .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .duration-badge {
      position: absolute;
      bottom: 5px; right: 5px;
      background: #000000cc;
      color: #fff;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .video-meta { flex: 1; min-width: 0; }

    .video-meta h3 {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      line-height: 1.3;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .video-meta .channel {
      color: var(--muted);
      font-size: 0.8rem;
    }

    /* ── Quality grid ── */
    .section-label {
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .quality-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
      margin-bottom: 24px;
    }

    .quality-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      text-align: center;
      user-select: none;
    }

    .quality-card:hover {
      border-color: var(--accent)40;
      background: var(--accent)08;
    }

    .quality-card.selected {
      border-color: var(--accent);
      background: var(--accent)12;
    }

    .quality-card:active { transform: scale(0.97); }

    .q-label {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.3rem;
      color: var(--text);
      margin-bottom: 4px;
    }

    .quality-card.selected .q-label { color: var(--accent); }

    .q-meta {
      font-size: 0.72rem;
      color: var(--muted);
    }

    /* ── Download button ── */
    .btn-download {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      padding: 16px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.3px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-download:hover { background: var(--accent2); }
    .btn-download:active { transform: scale(0.99); }
    .btn-download:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Progress ── */
    .progress-wrap {
      display: none;
      margin-top: 16px;
    }

    .progress-wrap.visible { display: block; }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      width: 0%;
      transition: width 0.4s ease;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0%   { filter: brightness(1); }
      50%  { filter: brightness(1.3); }
      100% { filter: brightness(1); }
    }

    /* ── Download ready ── */
    .download-ready {
      display: none;
      margin-top: 16px;
      background: var(--accent)12;
      border: 1px solid var(--accent)30;
      border-radius: var(--radius);
      padding: 18px 20px;
      text-align: center;
      animation: fadeUp 0.3s ease;
    }

    .download-ready.visible { display: block; }

    .download-ready p {
      color: var(--accent);
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 12px;
    }

    .btn-save {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #000;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 12px 28px;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn-save:hover { background: var(--accent2); }

    /* ── Features strip ── */
    .features {
      display: flex;
      justify-content: center;
      gap: 28px;
      flex-wrap: wrap;
      margin-top: 48px;
      padding-top: 32px;
      border-top: 1px solid var(--border);
    }

    .feat {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .feat-dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Spinner ── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid #00000040;
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      .video-inner { flex-direction: column; }
      .thumb-wrap { width: 100%; }
      .quality-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

<div class="glow"></div>

<div class="container">

  <!-- Header -->
  <header>
    <div class="logo">Grab<span>Vid</span></div>
    <div class="badge">V1 — Free</div>
  </header>

  <!-- Hero -->
  <div class="hero">
    <h1>Download <em>Any</em> YouTube<br>Video. Any Quality.</h1>
    <p>Paste a link. Pick your quality. Done.</p>
  </div>

  <!-- URL Input -->
  <div class="input-wrap">
    <input type="text" id="urlInput" placeholder="Paste YouTube link here..." />
    <button class="btn-fetch" id="fetchBtn" onclick="fetchInfo()">Fetch Video</button>
  </div>

  <!-- Error -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- Video Info Card -->
  <div class="video-card" id="videoCard">
    <div class="video-inner">
      <div class="thumb-wrap">
        <img id="thumb" src="" alt="thumbnail" />
        <span class="duration-badge" id="durationBadge"></span>
      </div>
      <div class="video-meta">
        <h3 id="videoTitle"></h3>
        <div class="channel" id="channelName"></div>
      </div>
    </div>
  </div>

  <!-- Quality Selection -->
  <div id="qualitySection" style="display:none">
    <div class="section-label">Select Quality</div>
    <div class="quality-grid" id="qualityGrid"></div>

    <button class="btn-download" id="downloadBtn" onclick="startDownload()" disabled>
      <span id="downloadBtnText">Select a quality first</span>
    </button>

    <!-- Progress -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-label">
        <span id="progressStatus">Processing...</span>
        <span id="progressPct"></span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <!-- Download Ready -->
    <div class="download-ready" id="downloadReady">
      <p>✓ Your video is ready!</p>
      <a href="#" id="saveLink" class="btn-save">
        ↓ Save Video
      </a>
    </div>
  </div>

  <!-- Features -->
  <div class="features">
    <div class="feat"><div class="feat-dot"></div>No signup required</div>
    <div class="feat"><div class="feat-dot"></div>Up to 4K quality</div>
    <div class="feat"><div class="feat-dot"></div>Files auto-deleted in 1hr</div>
    <div class="feat"><div class="feat-dot"></div>100% free</div>
  </div>

</div>

<script>
  let selectedQuality = null;
  let currentJobId = null;
  let pollInterval = null;
  let fakeProgress = 0;
  let fakePct = 0;

  // ── Utility ──────────────────────────────────────────────────────────────
  function formatDuration(secs) {
    if (!secs) return '';
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    const s = secs % 60;
    return h > 0
      ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
      : `${m}:${String(s).padStart(2,'0')}`;
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function hideError() {
    document.getElementById('errorMsg').style.display = 'none';
  }

  function setFetchLoading(loading) {
    const btn = document.getElementById('fetchBtn');
    btn.disabled = loading;
    btn.textContent = loading ? 'Fetching...' : 'Fetch Video';
  }

  // ── Fetch Info ───────────────────────────────────────────────────────────
  async function fetchInfo() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) return showError('Please paste a YouTube URL.');

    hideError();
    setFetchLoading(true);
    resetDownloadUI();

    try {
      const res = await fetch('/api/info', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url }),
      });

      const data = await res.json();
      if (!res.ok) return showError(data.error || 'Failed to fetch video info.');

      // Populate card
      document.getElementById('thumb').src = data.thumbnail;
      document.getElementById('videoTitle').textContent = data.title;
      document.getElementById('channelName').textContent = data.channel || '';
      document.getElementById('durationBadge').textContent = formatDuration(data.duration);

      document.getElementById('videoCard').classList.add('visible');

      // Populate qualities
      buildQualityGrid(data.qualities);
      document.getElementById('qualitySection').style.display = 'block';

    } catch (err) {
      showError('Network error. Is the server running?');
    } finally {
      setFetchLoading(false);
    }
  }

  // ── Quality Grid ─────────────────────────────────────────────────────────
  function buildQualityGrid(qualities) {
    const grid = document.getElementById('qualityGrid');
    grid.innerHTML = '';
    selectedQuality = null;
    document.getElementById('downloadBtn').disabled = true;
    document.getElementById('downloadBtnText').textContent = 'Select a quality first';

    qualities.forEach(q => {
      const card = document.createElement('div');
      card.className = 'quality-card';
      card.dataset.height = q.height;
      card.innerHTML = `
        <div class="q-label">${q.quality}</div>
        <div class="q-meta">${q.fps >= 60 ? '60fps · ' : ''}${q.filesize || 'Est. size N/A'}</div>
      `;
      card.addEventListener('click', () => selectQuality(card, q.height));
      grid.appendChild(card);
    });
  }

  function selectQuality(card, height) {
    document.querySelectorAll('.quality-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    selectedQuality = height;
    document.getElementById('downloadBtn').disabled = false;
    document.getElementById('downloadBtnText').textContent = `Download ${height}p`;
  }

  // ── Download ─────────────────────────────────────────────────────────────
  async function startDownload() {
    if (!selectedQuality) return;

    const url = document.getElementById('urlInput').value.trim();
    document.getElementById('downloadBtn').disabled = true;
    document.getElementById('downloadBtnText').innerHTML = '<div class="spinner"></div> Starting...';

    // Show progress
    document.getElementById('progressWrap').classList.add('visible');
    document.getElementById('downloadReady').classList.remove('visible');
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('progressStatus').textContent = 'Queuing download...';

    // Fake progress (yt-dlp doesn't report % easily via exec)
    fakeProgress = 0;
    startFakeProgress();

    try {
      const res = await fetch('/api/download', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, quality: selectedQuality }),
      });

      const data = await res.json();
      if (!res.ok) return showError(data.error || 'Download failed.');

      currentJobId = data.jobId;
      pollStatus(currentJobId);

    } catch (err) {
      showError('Network error. Please try again.');
      resetDownloadUI();
    }
  }

  function startFakeProgress() {
    clearInterval(fakeProgress);
    fakePct = 5;
    updateProgressBar(fakePct);

    fakeProgress = setInterval(() => {
      if (fakePct < 85) {
        fakePct += Math.random() * 4;
        updateProgressBar(Math.min(fakePct, 85));
        document.getElementById('progressStatus').textContent = 'Downloading & merging...';
      }
    }, 800);
  }

  function updateProgressBar(pct) {
    document.getElementById('progressFill').style.width = `${pct.toFixed(0)}%`;
    document.getElementById('progressPct').textContent = `${pct.toFixed(0)}%`;
  }

  function pollStatus(jobId) {
    clearInterval(pollInterval);
    pollInterval = setInterval(async () => {
      try {
        const res = await fetch(`/api/status/${jobId}`);
        const data = await res.json();

        if (data.status === 'done') {
          clearInterval(pollInterval);
          clearInterval(fakeProgress);
          updateProgressBar(100);
          document.getElementById('progressStatus').textContent = 'Complete!';

          // Show save button
          setTimeout(() => {
            document.getElementById('saveLink').href = `/api/file/${jobId}`;
            document.getElementById('downloadReady').classList.add('visible');
            document.getElementById('downloadBtnText').textContent = `Download ${selectedQuality}p`;
            document.getElementById('downloadBtn').disabled = false;
          }, 500);

        } else if (data.status === 'error') {
          clearInterval(pollInterval);
          clearInterval(fakeProgress);
          showError(data.error || 'Processing failed.');
          document.getElementById('progressWrap').classList.remove('visible');
          document.getElementById('downloadBtnText').textContent = `Download ${selectedQuality}p`;
          document.getElementById('downloadBtn').disabled = false;
        }
      } catch {}
    }, 2000);
  }

  function resetDownloadUI() {
    clearInterval(pollInterval);
    clearInterval(fakeProgress);
    document.getElementById('progressWrap').classList.remove('visible');
    document.getElementById('downloadReady').classList.remove('visible');
    document.getElementById('videoCard').classList.remove('visible');
    document.getElementById('qualitySection').style.display = 'none';
    document.getElementById('downloadBtn').disabled = true;
    document.getElementById('downloadBtnText').textContent = 'Select a quality first';
    selectedQuality = null;
  }

  // ── Enter key support ─────────────────────────────────────────────────────
  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') fetchInfo();
  });
</script>

</body>
</html>
